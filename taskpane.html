<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Census Panel</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      padding: 20px;
      background: #f3f4f6;
      color: #1f2937;
    }
    h2 {
      font-size: 16px;
      margin-bottom: 16px;
      color: #111827;
    }
    .write-btn {
      background: #2563eb;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      width: 100%;
    }
    .write-btn:hover {
      background: #1d4ed8;
    }
    #status {
      margin-top: 14px;
      font-size: 13px;
      color: #16a34a;
    }

    /* Split button */
    .split-btn-wrapper {
      margin-top: 24px;
    }
    .split-btn-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6b7280;
      margin-bottom: 6px;
    }
    .split-btn {
      display: flex;
      border-radius: 8px;
      overflow: hidden;
      border: 1.5px solid #d1d5db;
      width: 100%;
    }
    .split-btn button {
      flex: 1;
      padding: 10px 0;
      font-size: 13px;
      font-weight: 600;
      border-radius: 0;
      border: none;
      cursor: pointer;
      transition: background 0.15s;
    }
    .split-btn .keep {
      background: #f0fdf4;
      color: #16a34a;
      border-right: 1.5px solid #d1d5db;
    }
    .split-btn .keep:hover {
      background: #dcfce7;
    }
    .split-btn .clear {
      background: #fff7ed;
      color: #ea580c;
    }
    .split-btn .clear:hover {
      background: #ffedd5;
    }
  </style>
</head>
<body>
  <h2>🏥 Census Panel</h2>
  <p style="font-size:13px; color:#6b7280; margin-bottom:16px;">
    Hello World demo — click the button to write to cell A1.
  </p>
  <button class="write-btn" onclick="writeHello()">Write to Sheet</button>
  <div id="status"></div>

  <div class="split-btn-wrapper">
    <div class="split-btn-label">Formatting</div>
    <div class="split-btn">
      <button class="keep" onclick="handleKeep()">✓ Keep</button>
      <button class="clear" onclick="handleClear()">✕ Clear</button>
    </div>
  </div>

  <script>
    Office.onReady(function () {
      console.log("Office.js ready");
    });

    function writeHello() {
      Excel.run(function (context) {
        var sheet = context.workbook.worksheets.getActiveWorksheet();
        var range = sheet.getRange("A1");
        range.values = [["Hello from Census Panel!"]];
        range.format.font.bold = true;
        range.format.font.color = "#2563eb";
        return context.sync().then(function () {
          document.getElementById("status").innerText = "✅ Written to A1!";
        });
      }).catch(function (error) {
        document.getElementById("status").innerText = "❌ Error: " + error.message;
      });
    }

    function handleKeep() {
      document.getElementById("status").innerText = "✅ Formatting kept.";
    }

    function handleClear() {
      document.getElementById("status").innerText = "🧹 Formatting cleared.";
    }
  </script>
</body>
</html>
